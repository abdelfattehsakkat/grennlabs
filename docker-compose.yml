version: '3.9'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: greenit-mongo
    restart: unless-stopped
    volumes:
      -  /home/cabinetapp/mongo-data/greenit:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: greenit
    ports:
      - "27022:27017"
    networks:
      - greenit-net

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: greenit-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/greenit?authSource=admin
      RESOURCES_DIR: /app/resources
    volumes:
      - ${RESOURCES_HOST_DIR:-./resources}:/app/resources:ro
    # Port lié uniquement à 127.0.0.1 : accessible par nginx local, pas depuis internet
    ports:
      - "127.0.0.1:3006:3006"
    depends_on:
      - mongodb
    networks:
      - greenit-net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: greenit-frontend
    restart: unless-stopped
    env_file: .env
    # Port lié uniquement à 127.0.0.1 : accessible par nginx local, pas depuis internet
    ports:
      - "127.0.0.1:3005:3005"
    networks:
      - greenit-net

  nginx:
    image: nginx:alpine
    container_name: greenit-nginx
    restart: unless-stopped
    ports:
      - "85:85"
      - "448:448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - nginx-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - greenit-net

volumes:
  nginx-webroot:

networks:
  greenit-net:
    driver: bridge
