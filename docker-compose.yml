version: '3.9'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: greenit-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: greenit
    networks:
      - greenit-net
    # Pas d'exposition directe sur l'hôte — accès interne uniquement

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: greenit-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/greenit
    ports:
      - "3006:3006"
    depends_on:
      - mongodb
    networks:
      - greenit-net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: greenit-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3005:3005"
    networks:
      - greenit-net

  nginx:
    image: nginx:alpine
    container_name: greenit-nginx
    restart: unless-stopped
    ports:
      - "85:85"
      - "448:448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - nginx-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - greenit-net

volumes:
  mongo-data:
  nginx-webroot:

networks:
  greenit-net:
    driver: bridge
